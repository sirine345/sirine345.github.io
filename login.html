<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="stylep.css">
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bone);
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(155, 157, 212, 0.2);
            box-shadow: 0 8px 32px rgba(61, 63, 143, 0.1);
        }
        .auth-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--sage);
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-card p {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 32px;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 32px;
            border-radius: 50px;
            background: #f5f5f5;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 1px;
            color: #999;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .auth-tab.active {
            background: var(--rouille);
            color: white;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(155, 157, 212, 0.3);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #444;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        .auth-input:focus {
            border-color: var(--rouille);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--rouille);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .auth-btn:hover {
            background: var(--sage);
            transform: translateY(-2px);
        }
        .auth-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .auth-msg.success {
            background: #e1f5ee;
            color: #0f6e56;
            display: block;
        }
        .auth-msg.error {
            background: #fcebeb;
            color: #a32d2d;
            display: block;
        }
    </style>
</head>
<body>

<div class="auth-section">
    <div class="auth-card">
        <h2>MedFlash</h2>
        <p>Connectez-vous pour accéder aux flashcards médicales</p>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
            <button class="auth-tab" onclick="switchTab('register')">Inscription</button>
        </div>

        <div class="auth-form active" id="form-login">
            <input class="auth-input" type="email" id="login-email" placeholder="Votre email">
            <input class="auth-input" type="password" id="login-password" placeholder="Votre mot de passe">
            <button class="auth-btn" onclick="login()">Se connecter</button>
            <div class="auth-msg" id="login-msg"></div>
        </div>

        <div class="auth-form" id="form-register">
            <input class="auth-input" type="text" id="reg-name" placeholder="Votre prénom">
            <input class="auth-input" type="email" id="reg-email" placeholder="Votre email">
            <input class="auth-input" type="password" id="reg-password" placeholder="Choisir un mot de passe">
            <button class="auth-btn" onclick="register()">Créer un compte</button>
            <div class="auth-msg" id="reg-msg"></div>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('form-login').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('form-register').classList.add('active');
    }
}

function register() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const msg = document.getElementById('reg-msg');

    if (!name || !email || !password) {
        msg.className = 'auth-msg error';
        msg.textContent = 'Veuillez remplir tous les champs.';
        return;
    }

    if (password.length < 6) {
        msg.className = 'auth-msg error';
        msg.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        return;
    }

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    if (users.find(u => u.email === email)) {
        msg.className = 'auth-msg error';
        msg.textContent = 'Cet email est déjà utilisé.';
        return;
    }

    users.push({ name, email, password });
    localStorage.setItem('users', JSON.stringify(users));

    msg.className = 'auth-msg success';
    msg.textContent = 'Compte créé ! Vous pouvez vous connecter.';

    setTimeout(() => switchTab('login'), 1500);
}

function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        msg.className = 'auth-msg error';
        msg.textContent = 'Email ou mot de passe incorrect.';
        return;
    }

    localStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'flashcard.html';
}
</script>

</body>
</html>
